<!DOCTYPE html>
<html>
<style>

body{
    background-color: black;
}
#container {
    margin: auto;
    width: 60%;
  height: 1000px;
  position: relative;
  background: rgb(67, 27, 6);
}
#animate {
  width: 100%;
  height: 50px;
  position: absolute;
  background-color: rgb(14, 65, 33);
  
}
#animate:hover {
  background-color: rgb(236, 97, 28);

}
</style>
<head>
    
</head>
<title>Tree</title>
<body>

<p><button onclick="myMove()">Click Me</button></p> 

<div id ="container">
  <div id ="animate"></div>
</div>

<script>
function myMove() {
  let id = null;
  const elem = document.getElementById("animate");   
  let pos = 0;
  clearInterval(id);
  id = setInterval(frame, 5);
  function frame() {
    if (pos == 200) {
      clearInterval(id);
    } else {
      pos++; 
      elem.style.height = pos + "px"; 
      
    }
  }
}

window.addEventListener("keydown", event => {

    const elem = document.getElementById("animate");   

    if (event.key == "f") {
        elem.style.height = 0;
    }

    if (event.key == "g") {
        myMove()
    }
  });

</script>

</body>
</html>
