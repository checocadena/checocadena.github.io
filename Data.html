<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corpora API Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            transition: background-color 0.5s ease; /* Smooth transition */
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #jsonData {
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container" id="dataContainer">
        <h1>Media Formats from Corpora Project</h1>

        <button onclick="fetchMediaFormats()">Fetch Media Formats</button>

        <pre id="jsonData"></pre>
    </div>

    <script>
        async function fetchMediaFormats() {
            try {
                const response = await fetch('https://corpora-api.glitch.me/music/media-formats');
                const data = await response.json();

                // Display the fetched data on the webpage
                document.getElementById('jsonData').textContent = JSON.stringify(data, null, 2);

                // Change background color randomly after fetching data
                changeBackgroundColor();
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function changeBackgroundColor() {
            const randomColor = getRandomColor();
            document.body.style.backgroundColor = randomColor;
        }

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }
    </script>
</body>
</html>
